<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Élan Atelier</title>
    <style>
        /* Simple CSS for the gallery page */
        
        /* Reset margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Body styling - matches the wine red theme of the main site */
        body {
            background-color: #6a1e2c;
            font-family: Arial, Helvetica, sans-serif;
            color: #f6ede8;
            min-height: 100vh;
        }
        
        /* Header section with back button */
        .gallery-header {
            text-align: center;
            padding: 40px 20px 20px 20px;
            border-bottom: 2px solid #c48976;
            margin-bottom: 40px;
        }
        
        .gallery-header h1 {
            font-size: 2.5rem;
            font-family: 'Times New Roman', serif;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #fff2ea;
        }
        
        /* Back to Home button */
        .back-btn {
            display: inline-block;
            background-color: #c48976;
            color: #4f1622;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .back-btn:hover {
            background-color: #ffddcc;
            transform: scale(1.02);
        }
        
        /* ========== SIMPLE GRID FOR 7 PICTURES ========== */
        /* The grid container - arranges images in rows */
        .image-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            
            /* CSS Grid - creates a responsive grid */
            display: grid;
            
            /* On large screens: 4 columns */
            /* On medium screens: 3 columns */
            /* On small screens: 2 columns */
            /* On mobile: 1 column */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            
            /* Space between grid items */
            gap: 25px;
        }
        
        /* Each card/item in the grid */
        .grid-item {
            background-color: #551a28;
            border-radius: 20px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid #bc7f6d;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        /* Hover effect - image lifts up slightly */
        .grid-item:hover {
            transform: translateY(-5px);
        }
        
        /* Styling for the images */
        .grid-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        
        /* Caption text under each image */
        .caption {
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ffefe7;
            background-color: #4a1522;
        }
        
        /* Simple footer */
        .gallery-footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            border-top: 1px solid #c18c78;
            color: #dbaa98;
            font-size: 0.8rem;
        }
        
        /* Responsive adjustments for very small screens */
        @media (max-width: 600px) {
            .image-grid {
                gap: 15px;
            }
            .grid-item img {
                height: 180px;
            }
            .gallery-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header section with title and back button -->
    <div class="gallery-header">
        <h1>✨ Élan Atelier Gallery ✨</h1>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <!-- 
        ============================================
        SIMPLE GRID FOR 7 PICTURES
        ============================================
        
        EXPLANATION OF THE GRID:
        
        1. The container <div class="image-grid"> uses CSS Grid.
        2. "grid-template-columns: repeat(auto-fit, minmax(250px, 1fr))" means:
           - Each column is at least 250px wide
           - It automatically fits as many columns as possible
           - On a big screen: 4-5 columns
           - On a tablet: 3 columns  
           - On a phone: 2 columns or 1 column
        
        3. Each picture is inside a "grid-item" div.
        4. Images use "object-fit: cover" so they fill the space without distortion.
        
        ============================================
        HOW TO ADD YOUR OWN IMAGES:
        ============================================
        
        To replace these placeholder images with your own:
        
        1. Upload your image files to the same folder as gallery.html
        2. Change the "src" attribute to your image filename
           Example: src="my-dress.jpg"
        3. Change the caption text to describe your image
        
        You can also add more pictures by copying this block:
        
        <div class="grid-item">
            <img src="your-image.jpg" alt="description">
            <div class="caption">Your caption here</div>
        </div>
    -->
    
    <!-- The 7-image grid -->
    <div class="image-grid">
        
        <!-- Image 1 -->
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=400&h=300&fit=crop" alt="Elegant dress">
            <div class="caption">Timeless Silk Dress</div>
        </div>
        
        <!-- Image 2 -->
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400&h=300&fit=crop" alt="Designer shoes">
            <div class="caption">Crocodile Loafers</div>
        </div>
        
        <!-- Image 3 -->
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=400&h=300&fit=crop" alt="Leather handbag">
            <div class="caption">Heritage Leather Bag</div>
        </div>
        
        <!-- Image 4 -->
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=400&h=300&fit=crop" alt="Fashion outfit">
            <div class="caption">Wine Red Blazer</div>
        </div>
        
        <!-- Image 5 -->
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1560769621-6ecf7387dde1?w=400&h=300&fit=crop" alt="Pearl accessories">
            <div class="caption">Pearl Collection</div>
        </div>
        
        <!-- Image 6 -->
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1581044777550-4cfa60707c03?w=400&h=300&fit=crop" alt="Sunglasses">
            <div class="caption">Signature Sunnies</div>
        </div>
        
        <!-- Image 7 -->
        <div class="grid-item">
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=400&h=300&fit=crop" alt="Style inspiration">
            <div class="caption">Effortless Elegance</div>
        </div>
        
    </div>
    
    <!-- Simple footer -->
    <div class="gallery-footer">
        <p>© 2025 Élan Atelier — Timeless elegance captured in every frame</p>
    </div>

    <!-- 
        ============================================
        VERY SIMPLE EXPLANATION:
        ============================================
        
        HOW THE GALLERY WORKS:
        
        1. The page has a title and a "Back to Home" button.
        2. The button is a link (<a href="index.html">) that takes you back.
        
        3. The 7 pictures are arranged using CSS Grid.
           - Grid automatically arranges pictures in rows.
           - On a computer: 4 pictures per row.
           - On a tablet: 3 pictures per row.
           - On a phone: 2 or 1 picture per row.
        
        4. Each picture has:
           - An image (using <img src="...">)
           - A caption (describing what it is)
        
        5. When you hover over a picture, it lifts up slightly (nice effect).
        
        TO USE YOUR OWN PICTURES:
        
        - Save your pictures in the same folder as gallery.html
        - Change the src="..." to your picture's filename
        - Example: src="my-fashion-photo.jpg"
        - Change the caption text inside the <div class="caption"> tags
        
        That's it! Very simple and clean.
    -->
    
</body>
</html>
