<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Make Your Outfit | Élan Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #6a1e2c; font-family: 'Inter', sans-serif; color: #f6ede8; line-height: 1.4; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 32px; }

        /* header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            padding: 28px 0 16px 0;
            border-bottom: 1px solid #e6bcad;
            margin-bottom: 32px;
        }
        .logo-area h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 2rem; color: #fff2ea; }
        .logo-area p { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: #f5d1c2; margin-top: 4px; }
        .nav-links { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #f3e2d9; transition: color 0.2s; }
        .nav-links a:hover { color: #ffddcc; }
        .home-btn { background: #c48976; color: #4f1622 !important; padding: 8px 20px; border-radius: 40px; font-weight: 700 !important; }
        .home-btn:hover { background: #ffddcc; transform: scale(1.05); }

        @media (max-width: 780px) {
            .container { padding: 0 20px; }
            .top-bar { flex-direction: column; gap: 16px; }
            .nav-links { gap: 20px; }
        }

        /* Hero section for outfit page */
        .page-hero {
            text-align: center;
            margin: 20px 0 40px;
        }
        .page-hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 600;
            color: #fff2ea;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .page-hero p {
            color: #dbaa98;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* Outfit Guide Section */
        .outfit-guide {
            margin: 30px 0 60px;
            background: linear-gradient(135deg, #2d0d15 0%, #4a1a28 50%, #2d0d15 100%);
            border-radius: 48px;
            padding: 50px 40px;
            border: 1px solid #ffb7a0;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        .outfit-guide::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 180, 150, 0.08) 0%, transparent 70%);
            animation: subtleGlow 8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes subtleGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .guide-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .guide-subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #ffcfbc;
            margin-bottom: 45px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: rgba(255, 220, 200, 0.15);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding: 8px 24px;
            border-radius: 60px;
            position: relative;
            z-index: 1;
        }
        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 1;
        }
        .step-item {
            background: linear-gradient(135deg, rgba(255, 220, 200, 0.08) 0%, rgba(255, 180, 150, 0.05) 100%);
            border-radius: 28px;
            padding: 20px 28px;
            transition: all 0.3s ease;
            border-left: 4px solid #ffb7a0;
        }
        .step-item:hover {
            background: linear-gradient(135deg, rgba(255, 220, 200, 0.2) 0%, rgba(255, 180, 150, 0.12) 100%);
            transform: translateX(10px);
            border-left-color: #ffddcc;
        }
        .step-header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .step-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 700;
            color: #ffcfbc;
            background: rgba(255, 200, 180, 0.2);
            padding: 4px 12px;
            border-radius: 40px;
        }
        .step-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: #ffffff;
        }
        .step-description {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #f0d5c8;
            padding-left: 12px;
            border-left: 2px solid rgba(255, 200, 180, 0.4);
            margin-top: 8px;
            font-style: italic;
        }
        .step-list {
            list-style: none;
            margin-top: 12px;
            padding-left: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .step-list li {
            font-size: 0.85rem;
            color: #f0d5c8;
            padding: 8px 18px;
            background: rgba(255, 220, 200, 0.1);
            border-radius: 40px;
            transition: all 0.2s ease;
            display: inline-block;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .step-list li:hover {
            background: rgba(255, 200, 180, 0.3);
            transform: scale(1.02);
            color: #ffffff;
        }
        .step-list li.selected {
            background: #c48976;
            color: #2d0d15;
            border-color: #ffddcc;
            box-shadow: 0 0 12px rgba(196, 137, 118, 0.5);
            font-weight: 600;
        }
        .final-cheatcode {
            background: linear-gradient(135deg, #c48976 0%, #a86b58 100%);
            border-radius: 28px;
            padding: 22px 28px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #ffddcc;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .final-cheatcode:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .final-cheatcode p {
            font-size: 1.05rem;
            font-style: italic;
            color: #2d0d15;
            margin: 0;
            font-weight: 600;
        }
        .final-cheatcode p strong {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 8px;
            color: #1e0a10;
        }

        /* Outfit Summary */
        .outfit-summary {
            margin-top: 30px;
            padding: 20px 28px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 28px;
            border: 1px dashed #ffb7a0;
            text-align: center;
        }
        .outfit-summary h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: #ffcfbc;
            margin-bottom: 12px;
        }
        .summary-content {
            font-size: 0.9rem;
            color: #f0d5c8;
            line-height: 1.6;
        }
        .reset-btn {
            margin-top: 15px;
            background: rgba(255, 200, 180, 0.2);
            border: 1px solid #c48976;
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffcfbc;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .reset-btn:hover {
            background: #c48976;
            color: #2d0d15;
        }

        /* Fancy Ending */
        .fancy-ending {
            text-align: center;
            margin: 50px 0 50px;
            padding: 0 20px;
        }
